<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="联系我 - 心之所向">
    <title>联系我 - 心之所向</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header & Navigation -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">WANDERLUST</div>
                <ul class="nav-menu">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="destinations.html">目的地</a></li>
                    <li><a href="gallery.html">画廊</a></li>
                    <li><a href="about.html">关于</a></li>
                    <li><a href="contact.html">联系</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="nav-btn" id="search-toggle" title="搜索">
                        <i class="fas fa-search"></i>
                    </button>
                    <button class="nav-btn" id="theme-toggle" title="切换主题">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1>联系我</h1>
            <p>有任何问题或建议？我很乐意听到你的声音</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container-narrow">
        <div style="margin: 3rem 0;">
            <!-- Contact Info -->
            <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); margin-bottom: 3rem;">
                <div style="text-align: center; padding: 2rem; background: var(--bg-secondary); border-radius: 12px; box-shadow: var(--shadow-md);">
                    <i class="fas fa-envelope" style="font-size: 2rem; color: var(--accent-main); margin-bottom: 1rem;"></i>
                    <h3 style="margin-bottom: 0.5rem;">邮箱</h3>
                    <p><a href="mailto:hello@wanderlust.com">hello@wanderlust.com</a></p>
                </div>
                <div style="text-align: center; padding: 2rem; background: var(--bg-secondary); border-radius: 12px; box-shadow: var(--shadow-md);">
                    <i class="fas fa-map-marker-alt" style="font-size: 2rem; color: var(--accent-main); margin-bottom: 1rem;"></i>
                    <h3 style="margin-bottom: 0.5rem;">位置</h3>
                    <p>全球旅行者<br>目前在亚洲</p>
                </div>
                <div style="text-align: center; padding: 2rem; background: var(--bg-secondary); border-radius: 12px; box-shadow: var(--shadow-md);">
                    <i class="fas fa-clock" style="font-size: 2rem; color: var(--accent-main); margin-bottom: 1rem;"></i>
                    <h3 style="margin-bottom: 0.5rem;">回复时间</h3>
                    <p>通常在 24 小时内<br>回复所有邮件</p>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="contact-form-wrapper">
                <h2 style="text-align: center; margin-bottom: 2rem;">发送消息</h2>
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">姓名 *</label>
                        <input type="text" id="name" name="name" required placeholder="请输入你的姓名">
                    </div>

                    <div class="form-group">
                        <label for="email">邮箱 *</label>
                        <input type="email" id="email" name="email" required placeholder="请输入你的邮箱">
                    </div>

                    <div class="form-group">
                        <label for="subject">主题 *</label>
                        <input type="text" id="subject" name="subject" required placeholder="邮件主题">
                    </div>

                    <div class="form-group">
                        <label for="message">消息 *</label>
                        <textarea id="message" name="message" required placeholder="请输入你的消息..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit">发送消息</button>
                </form>
                <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--text-secondary);">
                    这是一个演示表单。实际使用时需要配置后端服务来处理邮件。
                </p>
            </div>

            <!-- Social Media -->
            <section style="text-align: center; margin-top: 4rem;">
                <h2 style="margin-bottom: 2rem;">在社交媒体上关注我</h2>
                <div style="display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;">
                    <a href="#" style="display: flex; align-items: center; gap: 0.5rem; padding: 1rem 1.5rem; background: var(--bg-secondary); border-radius: 8px; box-shadow: var(--shadow-md); transition: transform 0.3s ease;">
                        <i class="fab fa-instagram" style="font-size: 1.5rem;"></i>
                        <span>Instagram</span>
                    </a>
                    <a href="#" style="display: flex; align-items: center; gap: 0.5rem; padding: 1rem 1.5rem; background: var(--bg-secondary); border-radius: 8px; box-shadow: var(--shadow-md); transition: transform 0.3s ease;">
                        <i class="fab fa-twitter" style="font-size: 1.5rem;"></i>
                        <span>Twitter</span>
                    </a>
                    <a href="#" style="display: flex; align-items: center; gap: 0.5rem; padding: 1rem 1.5rem; background: var(--bg-secondary); border-radius: 8px; box-shadow: var(--shadow-md); transition: transform 0.3s ease;">
                        <i class="fab fa-facebook" style="font-size: 1.5rem;"></i>
                        <span>Facebook</span>
                    </a>
                    <a href="#" style="display: flex; align-items: center; gap: 0.5rem; padding: 1rem 1.5rem; background: var(--bg-secondary); border-radius: 8px; box-shadow: var(--shadow-md); transition: transform 0.3s ease;">
                        <i class="fab fa-pinterest" style="font-size: 1.5rem;"></i>
                        <span>Pinterest</span>
                    </a>
                </div>
            </section>
        </div>
    </main>

    <!-- Search Modal -->
    <div class="search-modal" id="search-modal">
        <div class="search-modal-content">
            <input type="text" class="search-input" id="search-input" placeholder="搜索文章、目的地...">
            <div class="search-results" id="search-results"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="#" title="Twitter"><i class="fab fa-twitter"></i></a>
                    <a href="#" title="Facebook"><i class="fab fa-facebook"></i></a>
                    <a href="#" title="Pinterest"><i class="fab fa-pinterest"></i></a>
                </div>
                <p class="footer-copyright">&copy; 2024 Wanderlust Travel Blog. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
